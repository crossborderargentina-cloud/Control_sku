<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control SKU</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 40px;
        background: #f5f5f5;
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        font-size: 22px;
        padding: 12px;
        margin: 10px;
        width: 260px;
        text-align: center;
    }

    .contador {
        font-size: 22px;
        margin: 10px;
    }

    .ok { color: green; }
    .error { color: red; }

    #estado {
        font-size: 28px;
        margin-top: 20px;
        height: 40px;
    }

    .ok-bg {
        background-color: #d4edda;
    }

    .error-bg {
        background-color: #f8d7da;
    }

    button {
        padding: 12px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
    }
</style>

</head>
<body>

<h1>📦 Control de SKU</h1>

<input id="sku1" placeholder="Scan SKU 1" autofocus>
<input id="sku2" placeholder="Scan SKU 2">

<div class="contador ok">✔ OK: <span id="okCount">0</span></div>
<div class="contador error">❌ ERROR: <span id="errorCount">0</span></div>

<div id="estado"></div>

<button onclick="lap()">📍 LAP (Mesa)</button>
<button onclick="finalizar()">🏁 FINALIZAR</button>

<script>

let ok = 0;
let error = 0;
let laps = [];

let sku1 = document.getElementById("sku1");
let sku2 = document.getElementById("sku2");
let estado = document.getElementById("estado");


// 👉 Mover automáticamente a SKU2
sku1.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        sku2.focus();
    }
});

// 👉 Procesar automáticamente al escanear SKU2
sku2.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        procesar();
    }
});


function procesar() {

    document.body.classList.remove("ok-bg", "error-bg");

    if (sku1.value === sku2.value) {
        ok++;
        estado.textContent = "✔ OK";
        estado.style.color = "green";
        document.body.classList.add("ok-bg");
    } else {
        error++;
        estado.textContent = "❌ ERROR";
        estado.style.color = "red";
        document.body.classList.add("error-bg");
    }

    document.getElementById("okCount").textContent = ok;
    document.getElementById("errorCount").textContent = error;

    setTimeout(() => {
        document.body.classList.remove("ok-bg", "error-bg");
    }, 300);

    sku1.value = "";
    sku2.value = "";
    sku1.focus();
}


// 👉 Guardar corte por mesa
function lap() {

    laps.push({
        mesa: laps.length + 1,
        ok: ok,
        error: error,
        fecha: new Date().toLocaleString()
    });

    estado.textContent = `📍 LAP guardado (Mesa ${laps.length})`;
    estado.style.color = "blue";
}


// 👉 Exportar resultados
function finalizar() {

    let contenido = "Mesa,OK,ERROR,Fecha\n";

    laps.forEach(l => {
        contenido += `${l.mesa},${l.ok},${l.error},${l.fecha}\n`;
    });

    contenido += `TOTAL,${ok},${error},-\n`;

    let blob = new Blob([contenido], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "resultado_sku.csv";
    a.click();
}

</script>

</body>
</html>
