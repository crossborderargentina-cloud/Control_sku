<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control SKU RF</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
    background: #f5f5f5;
}

input {
    font-size: 24px;
    padding: 15px;
    margin: 10px;
    width: 280px;
    text-align: center;
}

.contador { font-size: 22px; }
.ok { color: green; }
.error { color: red; }

#estado {
    font-size: 26px;
    margin-top: 15px;
    height: 40px;
}

.ok-bg { background-color: #d4edda; }
.error-bg { background-color: #f8d7da; }
.repeat-bg { background-color: #fff3cd; }

button {
    padding: 14px 22px;
    margin: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>📦 Control SKU RF</h1>

<input id="sku1" placeholder="Scan SKU 1" autofocus>
<input id="sku2" placeholder="Scan SKU 2">

<div class="contador ok">✔ OK: <span id="okCount">0</span></div>
<div class="contador error">❌ ERROR: <span id="errorCount">0</span></div>

<div id="estado"></div>

<button onclick="lap()">📍 CAMBIAR MESA</button>
<button onclick="finalizar()">🏁 FINALIZAR</button>

<script>

let ok = 0;
let error = 0;
let laps = [];

// 👉 control de repetidos
let registros = new Set();

// 👉 iniciar automáticamente en mesa 1
let mesaActual = 1;
laps.push({
    mesa: 1,
    ok: 0,
    error: 0,
    fecha: new Date().toLocaleString()
});

let sku1 = document.getElementById("sku1");
let sku2 = document.getElementById("sku2");
let estado = document.getElementById("estado");


// 🔊 sonido error
function beepError() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = "square";
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);

    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}

// 🔊 sonido repetido (distinto)
function beepRepeat() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);

    osc.start();
    osc.stop(ctx.currentTime + 0.3);
}


// 👉 flujo automático RF
sku1.addEventListener("input", () => {
    if (sku1.value.length > 0) {
        setTimeout(() => sku2.focus(), 80);
    }
});

sku2.addEventListener("input", () => {
    if (sku2.value.length > 0) {
        setTimeout(() => procesar(), 80);
    }
});


function procesar() {

    document.body.classList.remove("ok-bg", "error-bg", "repeat-bg");

    let clave = sku1.value + "|" + sku2.value;

    // 🔁 validar repetido
    if (registros.has(clave)) {

        estado.textContent = "⚠️ REPETIDO";
        estado.style.color = "orange";
        document.body.classList.add("repeat-bg");

        beepRepeat();

        limpiar();
        return;
    }

    registros.add(clave);

    let mesa = laps[mesaActual - 1];

    if (sku1.value === sku2.value) {
        ok++;
        mesa.ok++;

        estado.textContent = "✔ OK";
        estado.style.color = "green";
        document.body.classList.add("ok-bg");

    } else {
        error++;
        mesa.error++;

        estado.textContent = "❌ ERROR";
        estado.style.color = "red";
        document.body.classList.add("error-bg");

        beepError();
    }

    document.getElementById("okCount").textContent = ok;
    document.getElementById("errorCount").textContent = error;

    setTimeout(() => {
        document.body.classList.remove("ok-bg", "error-bg", "repeat-bg");
    }, 250);

    limpiar();
}


function limpiar() {
    sku1.value = "";
    sku2.value = "";
    sku1.focus();
}


// 👉 cambiar mesa
function lap() {
    mesaActual++;

    laps.push({
        mesa: mesaActual,
        ok: 0,
        error: 0,
        fecha: new Date().toLocaleString()
    });

    estado.textContent = "📍 Mesa " + mesaActual;
    estado.style.color = "blue";

    limpiar();
}


// 👉 guardar CSV
function finalizar() {

    let contenido = "Mesa,OK,ERROR,Fecha\n";

    laps.forEach(l => {
        contenido += `${l.mesa},${l.ok},${l.error},${l.fecha}\n`;
    });

    contenido += `TOTAL,${ok},${error},-\n`;

    let blob = new Blob([contenido], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;

    let fecha = new Date().toISOString().replace(/[:.]/g, "-");
    a.download = "sku_control_" + fecha + ".csv";

    a.click();

    estado.textContent = "📁 Archivo guardado";
    estado.style.color = "blue";

    // reset total
    ok = 0;
    error = 0;
    laps = [];
    registros.clear();
    mesaActual = 1;

    laps.push({
        mesa: 1,
        ok: 0,
        error: 0,
        fecha: new Date().toLocaleString()
    });

    document.getElementById("okCount").textContent = 0;
    document.getElementById("errorCount").textContent = 0;

    sku1.focus();
}

</script>

</body>
</html>
